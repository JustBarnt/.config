add_newline = false

format = """
$directory\
$git_branch\
$git_status\
$fill\
$battery\
$golang\
$java\
$lua\
$nodejs\
$python\
$rust\
$cmd_duration\
$time\
$character"""

[fill]
symbol = ' '

[character]
success_symbol = '[пғ§](bold blue)'
error_symbol = '[вң–](bold red)'
format = "\n   $symbol "

[battery]
format = '\[[$symbol$percentage]($style)\]'

[[battery.display]]
threshold = 20
style = 'bold red'
discharging_symbol = 'п–Ӯ'

[cmd_duration]
style = 'bold cyan'
format = '\[[$duration]($style)\]'

[directory]
style = 'bold blue'
repo_root_style = 'bold blue'
format = '[ о—ҝ](blue)[ $path ]($style)'
repo_root_format = '[ о—»](blue)[ $repo_root]($repo_root_style)[$path ]($style)'

[git_branch]
symbol = 'пҗҳ'
style = 'bold cyan'
format = '[\[[$symbol $branch]($style)\]]($style)'

[git_status]
style = 'bold cyan'
untracked = ' [пҒӘ](bold yellow)'
ahead = ' п…¶${count}'
diverged = ' п—әп…¶${ahead_count}п…ө${behind_count}'
behind = ' п…ө${count}'
format = '([\[$all_status$ahead_behind\]]($style))'

[golang]
symbol = 'оҳ§'
style    = 'bold blue'
format = '[\[$symbol($version)\]]($style)'

[java]
symbol = 'оү–'
style = 'bold #D08770'
format = '[\[$symbol($version)\]]($style)'

[lua]
symbol = 'оҳ '
style = 'bold blue'
format = '[\[$symbol($version)\]]($style)'

[nodejs]
symbol = 'оңҳ'
style = 'bold green'
format = '[\[$symbol($version)\]]($style)'

[python]
symbol = 'оҲө'
style = 'bold yellow'
format = '[\[$symbol($version)\]]($style)'

[rust]
symbol = 'оһЁ'
style = 'bold purple'
format = '[\[$symbol($version)\]]($style)'

[time]
disabled = false
style = 'bold white'
format = '\[[$time]($style)\]'
